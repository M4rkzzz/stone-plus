name: Release desktop apps

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing signed annotated release tag, for example v0.9.6
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: stone-release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify signed release tag and commit identity
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag_ref="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${RELEASE_TAG}")"
          tag_type="$(jq -r '.object.type' <<<"$tag_ref")"
          tag_sha="$(jq -r '.object.sha' <<<"$tag_ref")"
          [[ "$tag_type" == 'tag' ]] || { echo 'Release ref must be an annotated signed tag.' >&2; exit 1; }

          tag_object="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}")"
          [[ "$(jq -r '.verification.verified' <<<"$tag_object")" == 'true' ]] || {
            echo 'Release tag signature is not GitHub Verified.' >&2
            jq '.verification' <<<"$tag_object" >&2
            exit 1
          }
          tagger_email="$(jq -r '.tagger.email' <<<"$tag_object")"
          node --input-type=module - "$tagger_email" <<'NODE'
          import { readFileSync } from 'node:fs'
          const identity = JSON.parse(readFileSync('PROJECT_IDENTITY.json', 'utf8'))
          const email = process.argv[2].toLowerCase()
          if (!identity.authorizedSigningEmails.some((value) => value.toLowerCase() === email)) {
            throw new Error(`Unauthorized release tagger email: ${email}`)
          }
          NODE

          target_type="$(jq -r '.object.type' <<<"$tag_object")"
          target_sha="$(jq -r '.object.sha' <<<"$tag_object")"
          [[ "$target_type" == 'commit' ]] || { echo 'Signed tag must point directly to a commit.' >&2; exit 1; }
          [[ "$(git rev-parse HEAD)" == "$target_sha" ]] || { echo 'Checkout does not match signed tag target.' >&2; exit 1; }

          commit="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${target_sha}")"
          [[ "$(jq -r '.commit.verification.verified' <<<"$commit")" == 'true' ]] || {
            echo 'Release commit is not GitHub Verified.' >&2
            jq '.commit.verification' <<<"$commit" >&2
            exit 1
          }
          commit_login="$(jq -r '.committer.login // .author.login // empty' <<<"$commit")"
          node --input-type=module - "$commit_login" <<'NODE'
          import { readFileSync } from 'node:fs'
          const identity = JSON.parse(readFileSync('PROJECT_IDENTITY.json', 'utf8'))
          const login = process.argv[2].toLowerCase()
          if (!identity.authorizedMaintainers.some((value) => value.toLowerCase() === login)) {
            throw new Error(`Unauthorized release commit signer: ${login || '<unknown>'}`)
          }
          NODE

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: npm run release:check -- "$RELEASE_TAG"

      - name: Validate source-available license boundary
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs'
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'))
          const lock = JSON.parse(readFileSync('package-lock.json', 'utf8'))
          const identity = JSON.parse(readFileSync('PROJECT_IDENTITY.json', 'utf8'))
          if (pkg.license !== 'SEE LICENSE IN LICENSE' || lock.packages?.['']?.license !== 'SEE LICENSE IN LICENSE') {
            throw new Error('Root package license metadata must point to LICENSE.')
          }
          if (pkg.version !== identity.licenseBoundary.firstSourceAvailableVersion || lock.version !== pkg.version) {
            throw new Error('Package version does not match the protected license baseline.')
          }
          const license = readFileSync('LICENSE', 'utf8')
          if (!license.startsWith('StonePlus Source Available License 1.0')) {
            throw new Error('Unexpected root LICENSE.')
          }
          const { createHash } = await import('node:crypto')
          const mirror = readFileSync(identity.license.mirrorFile)
          const digest = createHash('sha256').update(Buffer.from(license)).digest('hex')
          const mirrorDigest = createHash('sha256').update(mirror).digest('hex')
          if (digest !== identity.license.sha256 || mirrorDigest !== digest) {
            throw new Error('License identity digest or mirror is invalid.')
          }
          const certificate = readFileSync(identity.signing.windowsAuthenticode.certificateFile)
          const certificateDigest = createHash('sha256').update(certificate).digest('hex')
          if (certificateDigest !== identity.signing.windowsAuthenticode.sha256) {
            throw new Error('Windows signing certificate identity is invalid.')
          }
          if (identity.githubRepository !== process.env.GITHUB_REPOSITORY) {
            throw new Error('Workflow is not running in the canonical repository.')
          }
          NODE
          test -s LICENSES/Apache-2.0.txt
          test -s LICENSES/AGPL-3.0-or-later.txt
          test -s NOTICE
          test -s THIRD_PARTY_NOTICES.md
          test -s SOURCE_ACCESS.md
          test -s TRADEMARKS.md
          test -s AI_USAGE_POLICY.md
          test -s AGENTS.md
          test -s PROJECT_IDENTITY.json
          test -s LICENSE_BOUNDARY.md
          test -s .github/CODEOWNERS
          test -s REUSE.toml

      - name: Validate curated release notes
        shell: bash
        run: |
          notes="docs/releases/${RELEASE_TAG}.md"
          test -f "$notes" || { echo "Missing curated Release Note: $notes" >&2; exit 1; }
          grep -q '^## 版本亮点$' "$notes"
          grep -q '^## 验证$' "$notes"
          grep -q '^## 下载$' "$notes"
          grep -q '^> \[!WARNING\]$' "$notes"
          grep -q '^\*\*完整变更\*\*：https://github.com/M4rkzzz/stone-plus/compare/' "$notes"

      - name: Run checks and production build
        run: npm run check

  package:
    name: Package ${{ matrix.name }}
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            id: windows-x64
            os: windows-latest
            runtime_targets: win-x64
            packaged_runtime_checks: win-x64=release/win-unpacked/resources/sing-box
            builder_args: --win nsis portable --x64
            artifact_path: |
              release/StonePlus-*-windows-x64-setup.exe
              release/StonePlus-*-windows-x64-setup.exe.blockmap
              release/StonePlus-*-windows-x64-portable.exe
              release/StonePlus-CodeSigning.cer
              release/latest.yml
          - name: Linux x64
            id: linux-x64
            os: ubuntu-latest
            runtime_targets: linux-x64
            packaged_runtime_checks: linux-x64=release/linux-unpacked/resources/sing-box
            builder_args: --linux AppImage deb --x64
            artifact_path: |
              release/StonePlus-*-linux-x86_64.AppImage
              release/StonePlus-*-linux-amd64.deb
              release/latest-linux.yml
          - name: Linux arm64
            id: linux-arm64
            os: ubuntu-24.04-arm
            runtime_targets: linux-arm64
            packaged_runtime_checks: linux-arm64=release/linux-arm64-unpacked/resources/sing-box
            builder_args: --linux AppImage deb --arm64
            artifact_path: |
              release/StonePlus-*-linux-arm64.AppImage
              release/StonePlus-*-linux-arm64.deb
              release/latest-linux-arm64.yml
          - name: macOS Intel and Apple Silicon
            id: macos
            os: macos-15
            runtime_targets: mac-x64 mac-arm64
            packaged_runtime_checks: mac-x64=release/mac/Stone+.app/Contents/Resources/sing-box mac-arm64=release/mac-arm64/Stone+.app/Contents/Resources/sing-box
            builder_args: --mac dmg zip --x64 --arm64 --config.mac.identity=- --config.mac.hardenedRuntime=false
            artifact_path: |
              release/StonePlus-*-macos-x64.dmg
              release/StonePlus-*-macos-x64.dmg.blockmap
              release/StonePlus-*-macos-x64.zip
              release/StonePlus-*-macos-x64.zip.blockmap
              release/StonePlus-*-macos-arm64.dmg
              release/StonePlus-*-macos-arm64.dmg.blockmap
              release/StonePlus-*-macos-arm64.zip
              release/StonePlus-*-macos-arm64.zip.blockmap
              release/latest-mac.yml
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and verify pinned sing-box runtime
        shell: pwsh
        run: |
          $targets = '${{ matrix.runtime_targets }}'.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)
          ./scripts/fetch-sing-box.ps1 -Target $targets
          foreach ($target in $targets) {
            node scripts/verify-sing-box-runtime.mjs --target $target
            if ($LASTEXITCODE -ne 0) {
              throw "sing-box runtime verification failed for $target."
            }
          }

      - name: Require Windows signing material
        if: matrix.id == 'windows-x64'
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_SIGNING_CERT_SHA1: ${{ vars.WIN_SIGNING_CERT_SHA1 }}
        run: |
          foreach ($required in @('WIN_CSC_LINK', 'WIN_CSC_KEY_PASSWORD', 'WIN_SIGNING_CERT_SHA1')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($required))) {
              throw "Required Windows signing setting is missing: $required"
            }
          }

      - name: Build application
        run: npm run build

      - name: Build native packages
        env:
          WIN_CSC_LINK: ${{ matrix.id == 'windows-x64' && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ matrix.id == 'windows-x64' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
        run: >-
          npx electron-builder ${{ matrix.builder_args }} --publish never
          --config.extraMetadata.homepage=https://github.com/${{ github.repository }}
          --config.extraMetadata.repository=https://github.com/${{ github.repository }}
          --config.extraMetadata.author.name=${{ github.repository_owner }}
          --config.extraMetadata.author.email=${{ github.repository_owner }}@users.noreply.github.com
          --config.linux.maintainer=${{ github.repository_owner }}@users.noreply.github.com

      - name: Verify packaged sing-box runtime
        shell: pwsh
        run: |
          $checks = '${{ matrix.packaged_runtime_checks }}'.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)
          foreach ($check in $checks) {
            $parts = $check.Split('=', 2)
            if ($parts.Count -ne 2) {
              throw "Invalid packaged runtime check: $check"
            }
            $target = $parts[0]
            $root = $parts[1]
            node scripts/verify-sing-box-runtime.mjs --target $target --runtime-root $root --manifest-root $root --require-executable
            if ($LASTEXITCODE -ne 0) {
              throw "Packaged sing-box runtime verification failed for $target."
            }
            node scripts/smoke-sing-box-runtime.mjs --target $target --runtime-root $root --manifest-root $root
            if ($LASTEXITCODE -ne 0) {
              throw "Packaged sing-box runtime smoke test failed for $target."
            }
          }

      - name: Verify Windows signatures
        if: matrix.id == 'windows-x64'
        shell: pwsh
        env:
          WIN_SIGNING_CERT_SHA1: ${{ vars.WIN_SIGNING_CERT_SHA1 }}
        run: |
          $expectedThumbprint = $env:WIN_SIGNING_CERT_SHA1.Replace(' ', '').ToUpperInvariant()
          $signedFiles = @(
            'release/win-unpacked/Stone+.exe',
            (Get-ChildItem release/StonePlus-*-windows-x64-setup.exe -File -ErrorAction Stop).FullName,
            (Get-ChildItem release/StonePlus-*-windows-x64-portable.exe -File -ErrorAction Stop).FullName
          )
          foreach ($file in $signedFiles) {
            $signature = Get-AuthenticodeSignature -LiteralPath $file
            if (-not $signature.SignerCertificate) {
              throw "Authenticode signature is missing: $file"
            }
            if ($signature.SignerCertificate.Thumbprint.ToUpperInvariant() -ne $expectedThumbprint) {
              throw "Unexpected Authenticode signer: $file"
            }
            if ($signature.Status -in @('NotSigned', 'HashMismatch')) {
              throw "Invalid Authenticode signature for ${file}: $($signature.Status)"
            }
          }
          Copy-Item -LiteralPath build/signing/StonePlus-CodeSigning.cer -Destination release/StonePlus-CodeSigning.cer

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stone-${{ matrix.id }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  source:
    name: Prepare corresponding source
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: false

      - name: Prepare pinned corresponding source
        shell: pwsh
        run: ./scripts/prepare-sing-box-source.ps1

      - name: Prepare StonePlus corresponding source
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          archive="release/sources/StonePlus-${version}-source.tar.gz"
          mkdir -p release/sources
          git archive \
            --format=tar.gz \
            --prefix="StonePlus-${version}-source/" \
            --output="$archive" \
            HEAD
          test -s "$archive"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/LICENSE$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/package-lock.json$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/TRADEMARKS.md$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/SOURCE_ACCESS.md$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/AI_USAGE_POLICY.md$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/AGENTS.md$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/PROJECT_IDENTITY.json$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/LICENSE_BOUNDARY.md$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/.github/CODEOWNERS$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/REUSE.toml$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/LICENSES/LicenseRef-StonePlus-Source-Available-1.0.txt$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/LICENSES/Apache-2.0.txt$"
          tar -tzf "$archive" | grep -q "^StonePlus-${version}-source/LICENSES/AGPL-3.0-or-later.txt$"

      - name: Upload corresponding source
        uses: actions/upload-artifact@v4
        with:
          name: stone-corresponding-source
          path: release/sources/StonePlus-*.tar.gz
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

  attest:
    name: Attest release artifacts
    needs: [package, source]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: stone-*
          path: release-assets
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/*

  release:
    name: Publish GitHub Release
    needs: [package, source, attest]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      PRERELEASE_INPUT: ${{ inputs.prerelease || false }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install metadata validation dependencies
        run: npm ci

      - name: Download platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: stone-*
          path: release-assets
          merge-multiple: true

      - name: Verify expected updater assets
        shell: bash
        run: |
          version="${RELEASE_TAG#v}"
          expected=(
            "StonePlus-${version}-windows-x64-setup.exe"
            "StonePlus-${version}-windows-x64-setup.exe.blockmap"
            "StonePlus-${version}-windows-x64-portable.exe"
            "StonePlus-CodeSigning.cer"
            "StonePlus-${version}-source.tar.gz"
            "StonePlus-${version}-sing-box-1.13.14-corresponding-source.tar.gz"
            "StonePlus-${version}-linux-x86_64.AppImage"
            "StonePlus-${version}-linux-amd64.deb"
            "StonePlus-${version}-linux-arm64.AppImage"
            "StonePlus-${version}-linux-arm64.deb"
            "StonePlus-${version}-macos-x64.dmg"
            "StonePlus-${version}-macos-x64.dmg.blockmap"
            "StonePlus-${version}-macos-x64.zip"
            "StonePlus-${version}-macos-x64.zip.blockmap"
            "StonePlus-${version}-macos-arm64.dmg"
            "StonePlus-${version}-macos-arm64.dmg.blockmap"
            "StonePlus-${version}-macos-arm64.zip"
            "StonePlus-${version}-macos-arm64.zip.blockmap"
            "latest.yml"
            "latest-mac.yml"
            "latest-linux.yml"
            "latest-linux-arm64.yml"
          )
          for asset in "${expected[@]}"; do
            if [[ ! -f "release-assets/${asset}" ]]; then
              echo "Missing expected release asset: ${asset}" >&2
              exit 1
            fi
          done
          if [[ "$(find release-assets -maxdepth 1 -type f | wc -l)" -ne "${#expected[@]}" ]]; then
            echo 'Unexpected files were found in release-assets.' >&2
            find release-assets -maxdepth 1 -type f -print >&2
            exit 1
          fi

      - name: Validate update metadata URLs and SHA-512 hashes
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { createHash } from 'node:crypto'
          import { readFileSync, statSync } from 'node:fs'
          import { join } from 'node:path'
          import { load } from 'js-yaml'

          const root = 'release-assets'
          const version = process.env.RELEASE_TAG.replace(/^v/, '')
          const manifests = {
            'latest.yml': [
              `StonePlus-${version}-windows-x64-setup.exe`,
            ],
            'latest-mac.yml': [
              `StonePlus-${version}-macos-x64.dmg`,
              `StonePlus-${version}-macos-x64.zip`,
              `StonePlus-${version}-macos-arm64.dmg`,
              `StonePlus-${version}-macos-arm64.zip`,
            ],
            'latest-linux.yml': [
              `StonePlus-${version}-linux-x86_64.AppImage`,
              `StonePlus-${version}-linux-amd64.deb`,
            ],
            'latest-linux-arm64.yml': [
              `StonePlus-${version}-linux-arm64.AppImage`,
              `StonePlus-${version}-linux-arm64.deb`,
            ],
          }

          const sha512 = (file) => createHash('sha512').update(readFileSync(file)).digest('base64')

          for (const [manifestName, expectedUrls] of Object.entries(manifests)) {
            const manifest = load(readFileSync(join(root, manifestName), 'utf8'))
            if (!manifest || manifest.version !== version || !Array.isArray(manifest.files)) {
              throw new Error(`${manifestName} has an invalid version or files list.`)
            }
            const files = new Map(manifest.files.map((entry) => [entry.url, entry]))
            if (files.size !== expectedUrls.length || expectedUrls.some((url) => !files.has(url))) {
              throw new Error(`${manifestName} does not contain exactly the expected update URLs.`)
            }
            for (const url of expectedUrls) {
              const assetPath = join(root, url)
              const entry = files.get(url)
              if (entry.sha512 !== sha512(assetPath)) {
                throw new Error(`${manifestName} has an invalid SHA-512 hash for ${url}.`)
              }
              if (entry.size != null && entry.size !== statSync(assetPath).size) {
                throw new Error(`${manifestName} has an invalid size for ${url}.`)
              }
            }
            if (!files.has(manifest.path) || manifest.sha512 !== files.get(manifest.path).sha512) {
              throw new Error(`${manifestName} has inconsistent legacy path or SHA-512 fields.`)
            }
          }
          NODE

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release-assets
          find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' \
            | LC_ALL=C sort \
            | xargs sha256sum > SHA256SUMS

      - name: Create draft, upload assets, and publish GitHub Release
        shell: bash
        run: |
          assets=(release-assets/*)
          release_state="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null || true)"
          if [[ "$release_state" == 'false' ]]; then
            echo "Release ${RELEASE_TAG} is already published; refusing to replace immutable updater assets." >&2
            exit 1
          fi

          is_prerelease=false
          if [[ "$RELEASE_TAG" == *-* || "$PRERELEASE_INPUT" == 'true' ]]; then
            is_prerelease=true
          fi

          if [[ "$release_state" != 'true' ]]; then
            create_args=(
              "$RELEASE_TAG"
              --draft
              --repo "$GITHUB_REPOSITORY"
              --verify-tag
              --title "Stone+ ${RELEASE_TAG}"
              --notes-file "docs/releases/${RELEASE_TAG}.md"
            )
            if [[ "$is_prerelease" == 'true' ]]; then
              create_args+=(--prerelease)
            fi
            gh release create "${create_args[@]}"
          fi

          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

          mapfile -t local_assets < <(find release-assets -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)
          mapfile -t remote_assets < <(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | LC_ALL=C sort)
          if [[ "${local_assets[*]}" != "${remote_assets[*]}" ]]; then
            echo 'Draft Release assets do not match the locally verified set.' >&2
            diff <(printf '%s\n' "${local_assets[@]}") <(printf '%s\n' "${remote_assets[@]}") >&2 || true
            exit 1
          fi

          gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false --prerelease="$is_prerelease"
